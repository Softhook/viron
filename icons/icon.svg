<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#001a0d"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00ff88" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#00ff88" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>

  <!-- Outer glow -->
  <circle cx="256" cy="256" r="210" fill="url(#glow)" filter="url(#blur)"/>

  <!-- Virus body (hexagon) -->
  <polygon points="256,80 381,165 381,347 256,432 131,347 131,165"
           fill="none" stroke="#00ff88" stroke-width="8" opacity="0.9"/>

  <!-- Inner hexagon -->
  <polygon points="256,130 336,178 336,274 256,322 176,274 176,178"
           fill="none" stroke="#00cc66" stroke-width="4" opacity="0.6"/>

  <!-- Spike protrusions – top -->
  <line x1="256" y1="80" x2="256" y2="42" stroke="#00ff88" stroke-width="5" stroke-linecap="round"/>
  <circle cx="256" cy="36" r="7" fill="#00ff88"/>

  <!-- Spike – top-right -->
  <line x1="381" y1="165" x2="410" y2="148" stroke="#00ff88" stroke-width="5" stroke-linecap="round"/>
  <circle cx="416" cy="144" r="7" fill="#00ff88"/>

  <!-- Spike – bottom-right -->
  <line x1="381" y1="347" x2="410" y2="364" stroke="#00ff88" stroke-width="5" stroke-linecap="round"/>
  <circle cx="416" cy="370" r="7" fill="#00ff88"/>

  <!-- Spike – bottom -->
  <line x1="256" y1="432" x2="256" y2="470" stroke="#00ff88" stroke-width="5" stroke-linecap="round"/>
  <circle cx="256" cy="476" r="7" fill="#00ff88"/>

  <!-- Spike – bottom-left -->
  <line x1="131" y1="347" x2="102" y2="364" stroke="#00ff88" stroke-width="5" stroke-linecap="round"/>
  <circle cx="96" cy="370" r="7" fill="#00ff88"/>

  <!-- Spike – top-left -->
  <line x1="131" y1="165" x2="102" y2="148" stroke="#00ff88" stroke-width="5" stroke-linecap="round"/>
  <circle cx="96" cy="144" r="7" fill="#00ff88"/>

  <!-- V letter in centre -->
  <text x="256" y="290" font-family="Arial Black, sans-serif" font-size="140" font-weight="900"
        text-anchor="middle" fill="#00ff88" opacity="0.95">V</text>

  <!-- VIRON text below -->
  <text x="256" y="390" font-family="Arial, sans-serif" font-size="46" font-weight="700"
        text-anchor="middle" fill="#00cc66" letter-spacing="10">VIRON</text>
</svg>
