<!DOCTYPE html>
<html lang="en">

<head>
  <script src="p5.min.js"></script>
  <script src="p5.sound.min.js"></script>

  <link rel="stylesheet" type="text/css" href="style.css">
  <meta charset="utf-8" />

  <!-- PWA manifest -->
  <link rel="manifest" href="manifest.json">

  <!-- Viewport – full bleed, honour iOS safe areas (notch / Dynamic Island) -->
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

  <!-- iOS PWA full-screen ("Add to Home Screen") -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Viron" />

  <!-- Android / Chrome PWA -->
  <meta name="mobile-web-app-capable" content="yes" />

  <!-- Theme colour shown in browser chrome and OS task switcher -->
  <meta name="theme-color" content="#00ff88" />

  <!-- App description (used by some install prompts) -->
  <meta name="description"
    content="Viron – an action-packed space shooter. Fight the viral outbreak across an infinite alien landscape." />

  <!-- Apple touch icons (iOS / iPadOS home screen) -->
  <!-- iPhone (all modern models) -->
  <link rel="apple-touch-icon" sizes="180x180" href="icons/apple-touch-icon.png">
  <!-- iPad / iPad mini -->
  <link rel="apple-touch-icon" sizes="152x152" href="icons/apple-touch-icon-152.png">
  <!-- iPad Pro – all sizes including Apple Silicon (M1/M2/M3/M4) -->
  <link rel="apple-touch-icon" sizes="167x167" href="icons/apple-touch-icon-167.png">

  <!-- Favicons -->
  <link rel="icon" type="image/svg+xml" href="icons/icon.svg">
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png">

  <title>Viron</title>
</head>

<body>
  <!-- PWA install banner – hidden by default; shown by JS when appropriate -->
  <div id="pwa-banner" aria-live="polite" aria-label="Install Viron" style="display:none">
    <img src="icons/icon-192.png" width="40" height="40" alt="Viron icon">
    <div class="pwa-banner-text">
      <strong>Install Viron</strong>
      <span id="pwa-banner-sub">Play offline, full screen, anytime.</span>
    </div>
    <button id="pwa-install-btn" type="button">Install</button>
    <button id="pwa-dismiss-btn" type="button" aria-label="Dismiss">✕</button>
  </div>

  <!-- PWA update banner – hidden by default; shown when a new version is ready -->
  <div id="pwa-update-banner" aria-live="polite" aria-label="Update available" style="display:none">
    <div class="pwa-banner-text">
      <strong>Update Available</strong>
      <span>A new version of Viron is ready.</span>
    </div>
    <button id="pwa-update-btn" type="button">Update</button>
    <button id="pwa-update-dismiss-btn" type="button" aria-label="Dismiss">✕</button>
  </div>

  <script>
    document.addEventListener('touchmove', function (e) {
      if (e.target.tagName === 'CANVAS') {
        e.preventDefault();
      }
    }, { passive: false });

    // -------------------------------------------------------------------------
    // Register service worker and handle install + update flows
    // -------------------------------------------------------------------------
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {

        // ------------------------------------------------------------------
        // PWA install prompt (Chrome / Android / desktop)
        // ------------------------------------------------------------------
        (function () {
          var STORAGE_KEY = 'viron-pwa-dismissed';
          var banner = document.getElementById('pwa-banner');
          var installBtn = document.getElementById('pwa-install-btn');
          var dismissBtn = document.getElementById('pwa-dismiss-btn');
          var sub = document.getElementById('pwa-banner-sub');

          // Don't show banner if already running as installed PWA.
          var isInstalled =
            window.navigator.standalone === true ||
            window.matchMedia('(display-mode: standalone)').matches ||
            window.matchMedia('(display-mode: fullscreen)').matches;

          // Don't show banner if user dismissed it previously.
          var dismissed = false;
          try { dismissed = !!localStorage.getItem(STORAGE_KEY); } catch (_) { }

          if (isInstalled || dismissed) return;

          var deferredPrompt = null; // Chrome / Android / desktop

          // Detect iOS / iPadOS (iPadOS 13+ mimics macOS UA, check maxTouchPoints).
          var isIOS =
            /iPad|iPhone|iPod/.test(navigator.userAgent) ||
            (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);

          function showBanner() {
            banner.style.display = 'flex';
          }

          function hideBanner() {
            banner.style.display = 'none';
            try { localStorage.setItem(STORAGE_KEY, '1'); } catch (_) { }
          }

          dismissBtn.addEventListener('click', hideBanner);
          dismissBtn.addEventListener('touchstart', function (e) { e.stopPropagation(); });

          // --- Chrome / Android / desktop: use beforeinstallprompt ---
          window.addEventListener('beforeinstallprompt', function (e) {
            e.preventDefault();
            deferredPrompt = e;
            sub.textContent = 'Play offline, full screen, anytime.';
            showBanner();
          });

          installBtn.addEventListener('click', function () {
            if (deferredPrompt) {
              deferredPrompt.prompt();
              deferredPrompt.userChoice.then(function (result) {
                if (result.outcome === 'accepted') hideBanner();
                deferredPrompt = null;
              });
            }
          });
          installBtn.addEventListener('touchstart', function (e) { e.stopPropagation(); });

          // After install, hide the banner.
          window.addEventListener('appinstalled', hideBanner);

          // --- iOS / iPadOS Safari: beforeinstallprompt is not supported ---
          // Show instructions to use the Share → "Add to Home Screen" flow.
          if (isIOS) {
            var isSafari = /Safari/.test(navigator.userAgent) && !/CriOS|FxiOS|OPiOS|Chrome|Edg/.test(navigator.userAgent);
            if (isSafari) {
              sub.textContent = 'Tap \u2b06 Share, then \u201cAdd to Home Screen\u201d.';
              installBtn.style.display = 'none'; // No programmatic install on iOS
              showBanner();
            }
          }
        }());

        // ------------------------------------------------------------------
        // PWA update banner
        // Shown whenever a new service worker has finished installing and is
        // waiting to take over.  The user can tap "Update" to apply it
        // immediately (the page will reload) or dismiss it and update on
        // the next natural restart.
        // ------------------------------------------------------------------
        (function () {
          var updateBanner = document.getElementById('pwa-update-banner');
          var updateBtn = document.getElementById('pwa-update-btn');
          var dismissBtn = document.getElementById('pwa-update-dismiss-btn');
          var waitingSW = null;
          // Only set to true when the user explicitly triggers SKIP_WAITING.
          // Guards controllerchange so a first-install activation never
          // causes an unwanted reload (controller: null → active SW).
          var updateTriggered = false;

          function showUpdateBanner(sw) {
            waitingSW = sw;
            updateBanner.style.display = 'flex';
          }

          function hideUpdateBanner() {
            updateBanner.style.display = 'none';
            waitingSW = null;
          }

          // When the user taps "Update", tell the waiting SW to activate now.
          updateBtn.addEventListener('click', function () {
            if (waitingSW) {
              updateTriggered = true;
              waitingSW.postMessage({ type: 'SKIP_WAITING' });
            }
            hideUpdateBanner();
          });
          updateBtn.addEventListener('touchstart', function (e) { e.stopPropagation(); });
          dismissBtn.addEventListener('click', hideUpdateBanner);
          dismissBtn.addEventListener('touchstart', function (e) { e.stopPropagation(); });

          // When the SW controller changes (new SW activated), reload the page
          // so all assets come from the new cache.
          // Guard: only reload when an update was explicitly triggered by the user,
          // not on the initial installation (controller: null → first SW).
          navigator.serviceWorker.addEventListener('controllerchange', function () {
            if (updateTriggered) {
              window.location.reload();
            }
          });

          navigator.serviceWorker.register('./sw.js').then(function (reg) {

            // Case 1: a new SW is already waiting when this page loads
            // (e.g. the user had the app open in another tab while the update
            // installed, then switched back here).
            if (reg.waiting && navigator.serviceWorker.controller) {
              showUpdateBanner(reg.waiting);
            }

            // Case 2: a new SW starts installing while the page is open.
            reg.addEventListener('updatefound', function () {
              var newSW = reg.installing;
              if (!newSW) return;
              newSW.addEventListener('statechange', function () {
                // 'installed' means pre-caching is complete and the SW is
                // waiting to activate. Only show the banner when there is an
                // existing controller (i.e. this is an update, not a first
                // install).
                if (newSW.state === 'installed' && navigator.serviceWorker.controller) {
                  showUpdateBanner(newSW);
                }
              });
            });

          }).catch(function (err) {
            console.warn('Service worker registration failed:', err);
          });
        }());

      });
    }
  </script>
  <!--
    ═══════════════════════════════════════════════════════════════════════════════
    SCRIPT LOAD ORDER — this order IS the dependency contract.
    Moving any <script> above its @requires target will cause a ReferenceError.
    Each layer may only reference globals exported by layers above it.
    See docs/ARCHITECTURE.md for the full dependency graph.
    ═══════════════════════════════════════════════════════════════════════════════
    -->

    <!-- ── LAYER 0: Third-party (p5 is loaded in <head>) ──────────────────────── -->

    <!-- ── LAYER 1: Foundation — no game dependencies ────────────────────────── -->
    <!-- exports: findNearest -->
    <script src="utils.js"></script>
    <!-- exports: all constants, TileManager, infection, updateTimeOfDay, helpers -->
    <script src="constants.js"></script>

    <!-- ── LAYER 2: Asset / data files ───────────────────────────────────────── -->
    <!-- exports: SHIP_DESIGNS -->
    <script src="shipDesigns.js"></script>

    <!-- ── LAYER 3: Audio subsystem ───────────────────────────────────────────── -->
    <!-- exports: SFX_LEVEL_TUNES -->
    <script src="sfxTunes.js"></script>
    <!-- exports: SfxAmbient, SfxWeapons, SfxEnemies namespaces -->
    <script src="sfxAmbient.js"></script>
    <script src="sfxWeapons.js"></script>
    <script src="sfxEnemies.js"></script>
    <!-- exports: GameSFX class, gameSFX singleton -->
    <script src="sfx.js"></script>

    <!-- ── LAYER 4: Terrain subsystem ─────────────────────────────────────────── -->
    <!-- exports: TERRAIN_CONFIG, shader source strings -->
    <script src="terrainShaders.js"></script>
    <!-- exports: TerrainMath, TerrainGeometry, TerrainRender,
                 TerrainShadows, TerrainTrees, TerrainBuildings namespaces -->
    <script src="terrainMath.js"></script>
    <script src="terrainGeometry.js"></script>
    <script src="terrainRender.js"></script>
    <script src="terrainShadows.js"></script>
    <script src="terrainTrees.js"></script>
    <script src="terrainBuildings.js"></script>
    <!-- exports: building geometry helpers -->
    <script src="buildingGeometry.js"></script>
    <!-- exports: Terrain class, terrain singleton -->
    <script src="terrain.js"></script>

    <!-- ── LAYER 5: Particles & projectiles ───────────────────────────────────── -->
    <!-- exports: ParticleSystem class, particleSystem singleton -->
    <script src="particles.js"></script>
    <!-- exports: updateProjectilePhysics(), updateBarrierPhysics() -->
    <script src="projectiles.js"></script>

    <!-- ── LAYER 6: Enemy subsystem ───────────────────────────────────────────── -->
    <!-- exports: EnemyRenderer class -->
    <script src="enemyRenderer.js"></script>
    <!-- exports: EnemyAirAI, EnemyGroundAI, EnemyBossAI namespaces -->
    <script src="enemyAirBehaviors.js"></script>
    <script src="enemyGroundBehaviors.js"></script>
    <script src="enemyBossBehaviors.js"></script>
    <!-- exports: EnemyManager class, enemyManager singleton, ENEMY_DRAW_SCALE -->
    <!-- NOTE: ENEMY_DRAW_SCALE must be loaded before gameLoop.js -->
    <script src="enemies.js"></script>

    <!-- ── LAYER 7: Agents (villagers & wizards) ──────────────────────────────── -->
    <!-- exports: AgentManager base class, ENEMY_CONFRONT_OFFSET -->
    <script src="agentManager.js"></script>
    <!-- exports: VillagerManager class, villagerManager singleton -->
    <script src="villagers.js"></script>
    <!-- exports: WizardManager class, wizardManager singleton -->
    <script src="wizards.js"></script>

    <!-- ── LAYER 8: Player ────────────────────────────────────────────────────── -->
    <!-- exports: Vehicle class -->
    <script src="Vehicle.js"></script>
    <!-- exports: Player class, createPlayer, killPlayer, updateShipInput, ... -->
    <script src="player.js"></script>

    <!-- ── LAYER 9: HUD ───────────────────────────────────────────────────────── -->
    <!-- exports: HUD_Manager, RADAR_SCALE, HUD_WEAPON_LABELS, buffer caches -->
    <script src="hudCore.js"></script>
    <!-- exports: drawHUD, _projectToRadar -->
    <script src="hudComponents.js"></script>
    <!-- exports: drawMenu, drawGameOver, drawPauseScreen, HUD_Screens, ... -->
    <script src="hudScreens.js"></script>

    <!-- ── LAYER 10: Input & control ──────────────────────────────────────────── -->
    <!-- exports: aimAssist singleton -->
    <script src="aimAssist.js"></script>
    <!-- exports: MobileController class, mobileController, handleTouchStarted -->
    <script src="mobileControls.js"></script>
    <!-- exports: InputManager class, inputManager singleton -->
    <script src="InputManager.js"></script>
    <!-- exports: PhysicsEngine class, physicsEngine singleton -->
    <script src="PhysicsEngine.js"></script>

    <!-- ── LAYER 11: World & core state ───────────────────────────────────────── -->
    <!-- exports: initWorld(), randomizeMountainPeaks() -->
    <script src="worldGenerator.js"></script>
    <!-- exports: GameState class, gameState singleton -->
    <script src="gameState.js"></script>
    <!-- exports: GameRenderer class, gameRenderer singleton, compat shims -->
    <script src="gameRenderer.js"></script>
    <!-- exports: GameLoop namespace (checkCollisions, spreadInfection, ...) -->
    <!-- NOTE: must load after enemies.js (reads ENEMY_DRAW_SCALE at parse time) -->
    <script src="gameLoop.js"></script>

    <!-- ── LAYER 12: Entry point ──────────────────────────────────────────────── -->
    <!-- exports: p5 hooks (preload, setup, draw), startGame, startLevel -->
    <script src="sketch.js"></script>
</body>

</html>
